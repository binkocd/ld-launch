name: Go Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.11'
        cache: true

    - name: Install dependencies
      run: go mod download

    - name: Build ld-launch
      run: go build -v -o ld-launch .

    - name: Run Tests
      run: go test -v ./...